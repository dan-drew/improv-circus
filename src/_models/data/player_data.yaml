dylan:
  name: Dylan
  bio: >
    Dylan is a comedian, educator, and musician in the Bay Area. 
    His offbeat sense of humor can be seen in his improv, standup 
    and often absurd sketches. And while he now spends his days 
    producing and coaching, his past is marked by a stint as a 
    tsunami hunter – a job that was as unpredictable as his shows.
  image: dylan.jpg
  theaters: [all_out, endgames]
