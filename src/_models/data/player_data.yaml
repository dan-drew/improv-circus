# $schema: ./player_data.schema.yaml
dan:
  name: Dan Drew
  theaters: [all_out, csz_san_jose]
  image: dan.jpg
  bio: >
    Dan’s been doing improv since 2001, though not continuously — he occasionally wandered off to do other things, 
    as one does. He’s performed both competitive short form and long form on teams at ComedySportz and All Out, 
    mixing character voices, crisp game play, and the dry British/Canadian humour you get from growing up on 
    Monty Python and Kids in the Hall. He’s also known for "challenging" his teammates with surprise songs, 
    improvised poetry, or whatever else seems amusing in the moment. They love it. They do.
  location: Oakland
  home_town: Toronto
  improv_since: 2001
  social:
    instagram: '@ddrew555'

