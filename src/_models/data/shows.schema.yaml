$schema: "https://json-schema.org/draft/2020-12/schema"
type: array
items:
  type: object
  additionalProperties: false
  required: [type, when, theater, players]
  properties:
    name:
      type: string
    type:
      type: string
      pattern: ^[a-z_]*$
    slug:
      type: string
      pattern: ^[a-z0-9-]*$
    link:
      type: string
      format: uri
    when:
      type: object
      additionalProperties: false
      required: [date, time]
      properties:
        date:
          type: string
          format: date
        time:
          type: string
          pattern: ^\d{2}:\d{2}$
        timeZone:
          type: string
    duration:
      type: integer
      minimum: 1
    theater:
      type: string
      pattern: ^[a-z_]*$
    ticket_info:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
        link:
          type: string
          format: uri
    tickets:
      type: array
      items:
        type: object
        additionalProperties: false
        required: [cost]
        properties:
          cost:
            type: number
            minimum: 0
          description:
            type: string
          link:
            type: string
            format: uri
    description: 
      type: string
    image:
      type: string
      pattern: ^.*\.(png|jpg|jpeg)$
    players:
      type: array
      items:
        type: string
        pattern: ^[a-z_]*$
